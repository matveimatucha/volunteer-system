<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация волонтёров</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://firestore.googleapis.com">
    <link rel="preconnect" href="https://firestore.googleapis.com">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@300;400;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet"></noscript>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff6b35;
            --primary-dark: #e85a28;
            --secondary: #004e89;
            --accent: #f7b801;
            --dark: #1a1a2e;
            --light: #f8f9fa;
            --success: #2ecc71;
            --text: #2c3e50;
        }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 107, 53, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 78, 137, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 5rem;
            color: white;
            letter-spacing: 3px;
            margin-bottom: 1rem;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            line-height: 1;
        }

        .tagline {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
            letter-spacing: 1px;
        }

        .admin-link {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
            z-index: 100;
        }

        .admin-link:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .event-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            animation: fadeInUp 0.6s ease-out forwards;
            cursor: pointer;
        }

        .event-card:nth-child(1) { animation-delay: 0.1s; }
        .event-card:nth-child(2) { animation-delay: 0.2s; }
        .event-card:nth-child(3) { animation-delay: 0.3s; }
        .event-card:nth-child(4) { animation-delay: 0.4s; }
        .event-card:nth-child(5) { animation-delay: 0.5s; }
        .event-card:nth-child(6) { animation-delay: 0.6s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .event-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        }

        .event-header {
            padding: 2rem;
            color: white;
            position: relative;
            overflow: hidden;
        }

        /* Разноцветные плашки для мероприятий */
        .event-header.color-1 {
            background: linear-gradient(135deg, #ff6b35 0%, #e85a28 100%);
        }
        .event-header.color-2 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .event-header.color-3 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .event-header.color-4 {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        .event-header.color-5 {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }
        .event-header.color-6 {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }
        .event-header.color-7 {
            background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
        }
        .event-header.color-8 {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        .event-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .event-date {
            font-size: 0.9rem;
            opacity: 0.9;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .event-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
            letter-spacing: 1px;
        }

        .event-location {
            font-size: 0.95rem;
            opacity: 0.95;
            position: relative;
            z-index: 1;
        }

        .event-body {
            padding: 1.5rem 2rem 2rem;
        }

        .event-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .event-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }

        .spots-info {
            font-size: 0.9rem;
            color: #666;
        }

        .spots-count {
            font-weight: 700;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .register-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .register-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 107, 53, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            color: white;
        }

        .empty-state h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        .empty-state p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: white;
            font-size: 1.2rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .archive-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0 1.5rem;
        }

        .archive-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-family: 'Source Sans 3', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .archive-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .archive-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
        }

        .archive-section {
            margin-top: 1rem;
        }

        .archive-section .events-grid {
            opacity: 0.65;
        }

        .event-card.past {
            filter: grayscale(30%);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 3.5rem;
            }

            .events-grid {
                grid-template-columns: 1fr;
            }

            .admin-link {
                top: 1rem;
                right: 1rem;
                padding: 0.6rem 1.2rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <a href="admin.html" class="admin-link">⚙️ Админ-панель</a>

    <div class="container">
        <header>
            <h1>ВОЛОНТЁРСКИЕ МЕРОПРИЯТИЯ</h1>
            <p class="tagline">Присоединяйся и меняй мир к лучшему</p>
        </header>

        <div id="eventsContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Загружаем мероприятия...</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script>
        // ================================
        // ВАЖНО! ВСТАВЬТЕ ВАШ FIREBASE КОНФИГ
        // Берётся в консоли Firebase: Project settings → Your apps → Web app
        // ================================
        const firebaseConfig = {
            apiKey:            "AIzaSyCh17f9EFqQ-fAEGXTGpuzja-vY1RpePsc",
            authDomain:        "volunteer-system-6ce7f.firebaseapp.com",
            projectId:         "volunteer-system-6ce7f",
            storageBucket:     "volunteer-system-6ce7f.firebasestorage.app",
            messagingSenderId: "273894796704",
            appId:             "1:273894796704:web:41a8f945d72bb58201c8c5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();



        function createEventCard(event) {
            const card = document.createElement('div');
            card.className = 'event-card';
            
            const maxVolunteers = Number(event.maxVolunteers) || 0;
            const currentVolunteers = Number(event.currentVolunteers) || 0;
            const spotsLeft = Math.max(maxVolunteers - currentVolunteers, 0);
            const isClosed = (event.status || 'open') === 'closed';
            const canRegister = spotsLeft > 0 && !isClosed;
            
            const eventColor = event.color || '#ff6b35';
            
            card.innerHTML = `
                <div class="event-header" style="background: linear-gradient(135deg, ${eventColor} 0%, ${adjustColor(eventColor, -20)} 100%);">
                    <div class="event-date">${event.date}</div>
                    <div class="event-title">${event.title}</div>
                    <div class="event-location">📍 ${event.location}</div>
                </div>
                <div class="event-body">
                    <div class="event-description">${event.description}</div>
                    <div class="event-footer">
                        <div class="spots-info">
                            <span class="spots-count" style="color: ${eventColor};">${spotsLeft}</span>
                            <span>из ${maxVolunteers} мест</span>
                        </div>
                        <button class="register-btn" style="background: ${eventColor};" onmouseover="this.style.background='${adjustColor(eventColor, -20)}'" onmouseout="this.style.background='${eventColor}'" onclick="goToRegistration('${event.id}')" 
                                ${!canRegister ? 'disabled' : ''}>
                            ${isClosed ? 'Регистрация закрыта' : (spotsLeft > 0 ? 'Записаться' : 'Заполнено')}
                        </button>
                    </div>
                </div>
            `;
            
            return card;
        }

        // Функция для затемнения/осветления цвета
        function adjustColor(color, amount) {
            const clamp = (num) => Math.min(Math.max(num, 0), 255);
            const num = parseInt(color.replace('#', ''), 16);
            const r = clamp((num >> 16) + amount);
            const g = clamp(((num >> 8) & 0x00FF) + amount);
            const b = clamp((num & 0x0000FF) + amount);
            return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
        }

        function goToRegistration(eventId) {
            window.location.href = `register.html?event=${eventId}`;
        }

        const CACHE_KEY = 'volunteer_events';
        const CACHE_DURATION = 5 * 60 * 1000; // 5 минут

        function getCachedEvents() {
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (!raw) return null;
                const { events, ts } = JSON.parse(raw);
                if (Date.now() - ts > CACHE_DURATION) return null;
                return events;
            } catch {
                return null;
            }
        }

        function setCachedEvents(events) {
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify({ events, ts: Date.now() }));
            } catch {}
        }

        async function loadEventsWithCache() {
            // Показываем кэш мгновенно, если он свежий
            const cached = getCachedEvents();
            if (cached) {
                displayEvents(cached);
                // Тихо обновляем в фоне
                loadEvents(true);
                return;
            }
            // Кэша нет — грузим с лоадером
            await loadEvents(false);
        }

        function displayEvents(events) {
            const container = document.getElementById('eventsContainer');

            if (!events || events.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h2>Пока нет мероприятий</h2>
                        <p>Скоро здесь появятся интересные события!</p>
                    </div>
                `;
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Черновики скрыты, остальные делим на актуальные и архив
            const visible = events.filter(e => (e.status || 'open') !== 'draft');
            const active  = visible.filter(e => new Date(e.date) >= today);
            const past    = visible.filter(e => new Date(e.date) < today);

            let html = '';

            if (active.length > 0) {
                html += '<div class="events-grid">' +
                    active.map(() => '').join('') +
                '</div>';
            } else {
                html += `<div class="empty-state">
                    <h2>Пока нет мероприятий</h2>
                    <p>Скоро здесь появятся интересные события!</p>
                </div>`;
            }

            if (past.length > 0) {
                html += `<div class="archive-toggle">
                    <span class="archive-label">Прошедших мероприятий: ${past.length}</span>
                    <button class="archive-btn" onclick="toggleArchive()">Показать архив</button>
                </div>
                <div id="archiveSection" class="archive-section" style="display:none;">
                    <div class="events-grid" id="archiveGrid"></div>
                </div>`;
            }

            container.innerHTML = html;

            // Рендерим активные карточки
            if (active.length > 0) {
                const grid = container.querySelector('.events-grid');
                active.forEach(event => grid.appendChild(createEventCard(event)));
            }

            // Сохраняем прошедшие для ленивой отрисовки
            container._pastEvents = past;
        }

        function toggleArchive() {
            const section = document.getElementById('archiveSection');
            const btn = document.querySelector('.archive-btn');
            const container = document.getElementById('eventsContainer');

            if (section.style.display === 'none') {
                section.style.display = 'block';
                btn.textContent = 'Скрыть архив';

                // Рендерим прошедшие карточки один раз
                const grid = document.getElementById('archiveGrid');
                if (!grid.hasChildNodes() && container._pastEvents) {
                    container._pastEvents.forEach(event => {
                        const card = createEventCard(event);
                        card.classList.add('past');
                        grid.appendChild(card);
                    });
                }
            } else {
                section.style.display = 'none';
                btn.textContent = 'Показать архив';
            }
        }

        async function loadEvents(silent = false) {
            try {
                const snap = await db.collection('events').get();
                const events = snap.docs.map(d => d.data());
                setCachedEvents(events);
                displayEvents(events);
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                if (!silent) {
                    document.getElementById('eventsContainer').innerHTML = `
                        <div class="empty-state">
                            <h2>Ошибка загрузки</h2>
                            <p>Не удалось загрузить мероприятия. Проверьте конфиг Firebase.</p>
                        </div>
                    `;
                }
            }
        }

        // Загружаем мероприятия при загрузке страницы
        loadEventsWithCache();
    </script>
</body>
</html>
